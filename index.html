        /* 1. 우주 배경 및 기본 스타일 */
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }

        .font-future { font-family: 'Orbitron', sans-serif; }

        /* 2. 애니메이션: 배경 잔별 효과 (450개 고밀도 유지) */
        .star-field {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
            filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.8));
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 3. 애니메이션: 왼쪽 아래 -> 오른쪽 위로 작아지며 날아가는 우주선 */
        .spaceship-container {
            position: fixed;
            width: 40px; 
            height: 40px; 
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 대각선 비행 애니메이션 적용 */
            animation: soar-diagonal 20s ease-in-out infinite;
        }

        .spaceship-visual {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #22d3ee 0%, #818cf8 50%, #312e81 100%);
            border-radius: 50% 50% 10% 10%; /* 위쪽이 머리 방향 */
            filter: drop-shadow(0 0 8px #22d3ee) drop-shadow(0 0 15px #818cf8);
            position: relative;
            /* 오른쪽 위 목적지를 향하도록 머리 방향을 45도 회전 */
            transform: rotate(45deg); 
        }

        .spaceship-visual::after {
            content: '';
            position: absolute;
            bottom: -5px; 
            left: 50%;
            transform: translateX(-50%);
            width: 10px; 
            height: 10px; 
            background: #f59e0b;
            border-radius: 50%;
            filter: blur(3px) drop-shadow(0 0 5px #f59e0b);
            animation: engineFire 0.2s infinite alternate;
        }

        @keyframes engineFire {
            from { transform: translateX(-50%) scale(1); opacity: 0.8; }
            to { transform: translateX(-50%) scale(1.2); opacity: 1; }
        }

        /* 대각선 이동 및 크기 축소 스크립트 */
        @keyframes soar-diagonal {
            0% { 
                top: 110%; /* 화면 아래 바깥 출발 */
                left: -10%; /* 화면 왼쪽 바깥 출발 */
                transform: scale(1.2); /* 출발할 때는 크게 */
            }
            80%, 100% { 
                top: -10%; /* 화면 위 바깥 도착 */
                left: 110%; /* 화면 오른쪽 바깥 도착 */
                transform: scale(0.1); /* 별을 향해 멀어지며 아주 작게 축소 */
            }
        }

            border-radius: 50%;
            animation: super-glow-pure 2.5s infinite ease-in-out;
            pointer-events: none;
            background: white;
