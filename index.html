<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내일의 내 일(Job) 탐색</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000 url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" /></filter></defs><circle cx="10" cy="20" r="1" fill="white" opacity="0.8"/><circle cx="60" cy="15" r="0.5" fill="white" opacity="0.6"/><circle cx="80" cy="50" r="1.5" fill="white" opacity="0.7"/><circle cx="30" cy="70" r="0.8" fill="white" opacity="0.5"/><circle cx="90" cy="80" r="1" fill="white" opacity="0.9"/></svg>');
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Nanum Pen Script', cursive;
            overflow: hidden;
            position: relative;
        }

        /* 별 애니메이션 */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: transparent;
            padding: 50px 40px 20px 40px;
            max-width: 900px;
            margin: -100px auto 0 auto;
        }

        h1 {
            width: 100%;
            font-size: 4em;
            color: #a8f4ff;
            margin-bottom: 0;
            margin-top: 0;
            text-shadow: 0 0 20px rgba(138, 244, 255, 0.9), 0 0 40px rgba(96, 193, 255, 0.6);
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 2em;
            color: #00ff88;
            margin-top: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            letter-spacing: 1px;
        }

        /* 상단 메뉴 영역 (고르게 정렬 및 반응형 크기 적용) */
        .content {
            position: fixed;
            top: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2.5vw; /* 해상도에 맞춰 버튼 간격 자동 조절 */
            padding: 10px 15cm;
            z-index: 12;
        }

        /* 이미지 메뉴 버튼 전용 디자인 */
        .img-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            width: 60vw; /* 화면 크기에 비례하여 버튼 크기 조절 */
            max-width: 840px; /* 버튼 최대 크기 제한 */
            min-width: 420px; /* 버튼 최소 크기 제한 */
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .img-btn img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* 마우스를 올렸을 때(Hover) 살짝 떠오르며 은은한 빛 효과 */
        .img-btn:hover {
            transform: translateY(-6px) scale(1.05);
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.4)); 
        }

        /* 진한 네이비 골무형 우주선 */
        .spaceship {
            position: fixed;
            width: 45px;
            height: 55px;
            z-index: 5;
            pointer-events: none;
            transform-origin: center center;
        }

        .spaceship svg {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 0 8px rgba(11, 37, 89, 0.8));
        }

        /* 주황색으로 변경된 발사체 불빛 */
        .launch-glow {
            position: absolute;
            left: 50%;
            bottom: -5px;
            width: 14px;
            height: 22px;
            transform: translateX(-50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 200, 50, 0.9) 0%, rgba(255, 100, 0, 0.6) 60%, transparent 100%);
            filter: blur(2px);
            box-shadow: 0 0 12px 3px rgba(255, 120, 0, 0.5);
            animation: shimmer 0.5s ease-in-out infinite alternate;
        }

        @keyframes shimmer {
            from { opacity: 0.7; transform: translateX(-50%) scaleY(0.85); }
            to { opacity: 1; transform: translateX(-50%) scaleY(1.15); }
        }
    </style>
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    
    <div class="spaceship" id="spaceship" aria-label="우주선">
        <svg viewBox="0 0 60 70" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="navyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#0a1526" />
                    <stop offset="50%" stop-color="#162e54" />
                    <stop offset="100%" stop-color="#0a1526" />
                </linearGradient>
            </defs>
            <path d="M 15 55 L 15 25 C 15 5 45 5 45 25 L 45 55 C 45 65 15 65 15 55 Z" fill="url(#navyGradient)" stroke="#2a4d82" stroke-width="2"/>
            <path d="M 12 55 Q 30 65 48 55 L 48 60 Q 30 70 12 60 Z" fill="#050a12" />
            <circle cx="30" cy="25" r="6" fill="#88ccff" opacity="0.8" stroke="#ffffff" stroke-width="1"/>
            <circle cx="22" cy="40" r="1.5" fill="#050a12" opacity="0.6"/>
            <circle cx="30" cy="40" r="1.5" fill="#050a12" opacity="0.6"/>
            <circle cx="38" cy="40" r="1.5" fill="#050a12" opacity="0.6"/>
            <circle cx="26" cy="48" r="1.5" fill="#050a12" opacity="0.6"/>
            <circle cx="34" cy="48" r="1.5" fill="#050a12" opacity="0.6"/>
        </svg>
        <div class="launch-glow"></div>
    </div>

    <div class="content">
        <button class="img-btn"><img src="./image/상단메뉴_로그인.png" alt="신산업 세계로 로그인"></button>
        <button class="img-btn"><img src="./image/상단메뉴_자기이해.png" alt="자기 이해 체크"></button>
        <button class="img-btn"><img src="./image/상단메뉴_미래직무.png" alt="미래 직무 속으로 다이빙"></button>
        <button class="img-btn"><img src="./image/상단메뉴_포트폴리오.png" alt="진로 포트폴리오"></button>
        <button class="img-btn"><img src="./image/상단메뉴_자료실.png" alt="신산업 진로 교육 자료실"></button>
    </div>

    <div class="container">
        <h1>내 일(Tomorrow)의<br>내일(Job) 탐색</h1>
        <p class="subtitle">나만의 신산업 진로 탐험 가이드</p>
    </div>

    <script>
        // 별 배경 애니메이션
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5 + 0.5,
                opacity: Math.random(),
                speed: Math.random() * 0.02 + 0.005,
                dir: Math.random() > 0.5 ? 1 : -1
            });
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(star => {
                star.opacity += star.speed * star.dir;
                if (star.opacity >= 1 || star.opacity <= 0.1) star.dir *= -1;
                
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // 자연스러운 궤도 애니메이션 (가운데 한 바퀴 회전 후 퇴장)
        const spaceship = document.getElementById('spaceship');
        const flightDuration = 15000; // 15초 사이클
        let startTime = performance.now();

        function animateSpaceship(timestamp) {
            let elapsed = timestamp - startTime;
            let progress = (elapsed % flightDuration) / flightDuration; // 0 ~ 1 반복

            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const orbitRadius = Math.min(cx, cy) * 0.5; // 화면 중앙 궤도 크기

            let x, y, angle;

            if (progress < 0.3) {
                // 1단계: 좌측 하단에서 중앙으로 진입 (0.0 ~ 0.3)
                let t = progress / 0.3; // 0 ~ 1
                let easeT = t * (2 - t); // easeOut
                x = -100 + (cx - -100) * easeT;
                y = window.innerHeight + 100 + ((cy + orbitRadius) - (window.innerHeight + 100)) * easeT;
                // 목표 지점(cx, cy+radius)으로 향하는 각도 계산
                let dx = cx - -100;
                let dy = (cy + orbitRadius) - (window.innerHeight + 100);
                angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
                
                if (t > 0.8) {
                    // 궤도 진입 전 부드럽게 각도 회전
                    let targetAngle = 90; // 궤도 시작 각도 (수평)
                    angle = angle + (targetAngle - angle) * ((t - 0.8) / 0.2);
                }

            } else if (progress < 0.7) {
                // 2단계: 중앙에서 한 바퀴 원운동 (0.3 ~ 0.7)
                let t = (progress - 0.3) / 0.4; // 0 ~ 1
                let rad = (Math.PI / 2) - (t * Math.PI * 2); // 90도에서 시계방향으로 360도 회전
                
                x = cx + Math.cos(rad) * orbitRadius;
                y = cy + Math.sin(rad) * orbitRadius;
                
                // 접선 방향 계산 (우주선 머리가 진행방향을 향하도록)
                angle = (rad * (180 / Math.PI)); 

            } else {
                // 3단계: 중앙에서 우측 상단으로 퇴장 (0.7 ~ 1.0)
                let t = (progress - 0.7) / 0.3; // 0 ~ 1
                let easeT = t * t; // easeIn
                let startX = cx;
                let startY = cy - orbitRadius; // 궤도 종료 지점
                let endX = window.innerWidth + 100;
                let endY = -100;

                x = startX + (endX - startX) * easeT;
                y = startY + (endY - startY) * easeT;
                
                let dx = endX - startX;
                let dy = endY - startY;
                angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
            }

            // 우주선 위치 및 회전 적용 (크기도 궤도에서는 약간 작아지게 연출)
            let scale = progress > 0.3 && progress < 0.7 ? 0.85 : 1;
            spaceship.style.transform = `translate(-50%, -50%) rotate(${angle}deg) scale(${scale})`;
            spaceship.style.left = `${x}px`;
            spaceship.style.top = `${y}px`;

            requestAnimationFrame(animateSpaceship);
        }
        
        requestAnimationFrame(animateSpaceship);
    </script>
</body>
</html>
