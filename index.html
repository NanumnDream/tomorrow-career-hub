<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미래 신산업 연계 진로 탐색 시스템</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 기본 설정 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #02040a;
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr;
            place-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            background-color: #02040a;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('http://googleusercontent.com/image_collection/image_retrieval/2902570400736455904');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 40px 60px;
        }

        /* [수정] 캔버스 우주선 애니메이션: 왼쪽 -> 중앙 루프 -> 오른쪽 위로 점진적 축소 */
        .spaceship-canvas {
            position: absolute;
            width: 120px;
            height: 120px;
            z-index: 15;
            pointer-events: none;
            /* offset-path를 이용해 지정된 곡선 경로(M:시작, Q/C:곡선)를 따라가며 자동 회전 */
            offset-path: path('M -200 550 Q 200 500 450 450 C 750 150, 650 50, 550 150 C 350 300, 500 650, 750 400 Q 1050 200 1400 -200');
            offset-rotate: auto;
            animation: flyLoop 10s linear infinite;
        }

        @keyframes flyLoop {
            0% { offset-distance: 0%; transform: scale(1.2); opacity: 0; }
            5% { opacity: 1; }
            70% { transform: scale(0.7); opacity: 1; }
            100% { offset-distance: 100%; transform: scale(0.1); opacity: 0; }
        }

        /* [수정] 밤하늘 별 효과를 위한 캔버스 */
        .stars-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 상단 메뉴: 번호 제외, 각기 다른 형광색 박스 */
        .neon-header {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
            margin-bottom: 40px;
            z-index: 10;
        }

        .neon-box {
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 4px;
            color: #000;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .neon-box.cyan { background-color: #00E5FF; box-shadow: 0 0 15px #00E5FF; }
        .neon-box.green { background-color: #39FF14; box-shadow: 0 0 15px #39FF14; }
        .neon-box.magenta { background-color: #FF00FF; box-shadow: 0 0 15px #FF00FF; }
        .neon-box.yellow { background-color: #FFEF00; box-shadow: 0 0 15px #FFEF00; }
        .neon-box.orange { background-color: #FF8A00; box-shadow: 0 0 15px #FF8A00; }

        /* 타이틀 크기 축소 (기존 절반 수준) */
        .slide-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 40px; 
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
            text-align: center;
            letter-spacing: 2px;
            width: 100%;
            z-index: 10;
        }

        .subtitle {
            font-size: 18px;
            color: #a0aec0;
            text-align: center;
            margin-bottom: 50px;
            line-height: 1.6;
            z-index: 10;
        }

        /* 레이아웃 공통 설정 */
        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            z-index: 10;
        }

        .section-title-layout h2 {
            font-size: 60px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #00E5FF, #39FF14);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .section-title-layout hr {
            width: 150px;
            height: 4px;
            background: #00E5FF;
            border: none;
            margin: 20px auto;
        }

        .tiled-content { display: flex; gap: 30px; width: 100%; }
        .tile {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 12px;
