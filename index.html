<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내일(Tomorrow)의 내 일(Job) 탐색 | 나만의 신산업 진로 탐험 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Pretendard:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 1. 우주 배경 및 기본 스타일 */
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }

        .font-future { font-family: 'Orbitron', sans-serif; }

        /* 2. 애니메이션: 배경 잔별 효과 (650개 초고밀도 제어) */
        .star-field {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
            filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.8));
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 3. 수정: 일정한 속도로 멈춤 없이 부드럽게 비행하는 우주선 (linear 적용) */
        .spaceship-container {
            position: fixed;
            width: 40px; 
            height: 40px; 
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            /* ease-in-out 대신 linear를 주어 중간 속도 저하 및 멈춤 현상을 완전히 제거 */
            animation: soar-and-loop 38s linear infinite;
        }

        .spaceship-visual {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #22d3ee 0%, #818cf8 50%, #312e81 100%);
            border-radius: 50% 50% 10% 10%; 
            filter: drop-shadow(0 0 8px #22d3ee) drop-shadow(0 0 15px #818cf8);
            position: relative;
        }

        .spaceship-visual::after {
            content: '';
            position: absolute;
            bottom: -5px; 
            left: 50%;
            transform: translateX(-50%);
            width: 10px; 
            height: 10px; 
            background: #f59e0b;
            border-radius: 50%;
            filter: blur(3px) drop-shadow(0 0 5px #f59e0b);
            animation: engineFire 0.2s infinite alternate;
        }

        @keyframes engineFire {
            from { transform: translateX(-50%) scale(1); opacity: 0.8; }
            to { transform: translateX(-50%) scale(1.2); opacity: 1; }
        }

        /* 등속도 선형 대각선 루프 궤도 */
        @keyframes soar-and-loop {
            0% { 
                top: 110%; left: -10%; 
                transform: scale(1.3) rotate(45deg); 
            }
            25% { 
                top: 65%; left: 35%; 
                transform: scale(1.0) rotate(45deg); 
            }
            37% { 
                top: 35%; left: 50%; 
                transform: scale(0.85) rotate(90deg); 
            }
            49% { 
                top: 50%; left: 65%; 
                transform: scale(0.75) rotate(180deg); 
            }
            61% { 
                top: 65%; left: 50%; 
                transform: scale(0.65) rotate(270deg); 
            }
            73% { 
                top: 50%; left: 35%; 
                transform: scale(0.55) rotate(360deg); 
            }
            83% { 
                top: 30%; left: 55%; 
                transform: scale(0.4) rotate(405deg); 
            }
            100% { 
                top: -15%; left: 115%; 
                transform: scale(0.05) rotate(405deg); 
            }
        }

        /* 4. 수정: 진짜 밤하늘 원형 스타일을 유지하면서 크기와 빛 번짐을 대폭 키운 별 효과 */
        .special-circle-star {
            position: absolute;
            border-radius: 50%;
            animation: super-glow-pure 2.0s infinite ease-in-out;
            pointer-events: none;
            background: #fff;
        }
        @keyframes super-glow-pure {
            0%, 100% { 
                opacity: 0.4; 
                transform: scale(0.8);
                box-shadow: 0 0 8px #fff, 0 0 15px var(--glow-color);
            }
            50% { 
                opacity: 1; 
                transform: scale(1.3);
                box-shadow: 0 0 20px #fff, 0 0 35px var(--glow-color), 0 0 55px var(--glow-color);
            }
        }

        /* 5. 박스 디자인 (Glassmorphism) */
        .glass-box {
            background: rgba(8, 15, 30, 0.7);
            border: 1px solid rgba(34, 211, 238, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-box:hover {
            border-color: #22d3ee;
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.15);
            transform: translateY(-10px) scale(1.02);
        }

        .neon-text {
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.7);
        }
    </style>
</head>
<body>

    <div class="star-field" id="starField"></div>

    <div class="spaceship-container">
        <div class="spaceship-visual"></div>
    </div>

    <header class="fixed top-0 w-full z-50 border-b border-white/10 bg-black/60 backdrop-blur-md">
        <div class="max-w-7xl mx
