<html lang="ko" class="scroll-smooth">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전지적 전공시점 | 우주를 넘는 진로 탐사</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Pretendard:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        /* 1. 우주 배경 및 기본 스타일 */
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }

        .font-future { font-family: 'Orbitron', sans-serif; }

        /* 2. 애니메이션: 반짝이는 별 */
        .star-field {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 3. 애니메이션: 유영하는 우주선 */
        .spaceship {
            position: fixed;
            width: 40px;
            height: 40px;
            color: #22d3ee;
            font-size: 2rem;
            z-index: 10;
            pointer-events: none;
            animation: roam 20s linear infinite;
            filter: drop-shadow(0 0 10px #22d3ee);
        }

        @keyframes roam {
            0% { top: 10%; left: -50px; transform: rotate(90deg); }
            25% { top: 40%; left: 30%; transform: rotate(110deg); }
            50% { top: 70%; left: 60%; transform: rotate(70deg); }
            75% { top: 30%; left: 90%; transform: rotate(130deg); }
            100% { top: 10%; left: calc(100% + 50px); transform: rotate(90deg); }
        }
