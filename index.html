<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내일(Tomorrow)의 내 일(Job) 탐색 | 나만의 신산업 진로 탐험 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Pretendard:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* [그대로 유지] 1. 우주 배경 및 기본 스타일 */
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }

        .font-future { font-family: 'Orbitron', sans-serif; }

        /* [그대로 유지] 2. 애니메이션: 배경 잔별 효과 (450개 고밀도) */
        .star-field {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
            filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.8));
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* [수정] 3. 애니메이션: 왼쪽에서 나타나 가운데서 한바퀴 돌고 오른쪽 위로 사라지는 우주선 */
        .spaceship-container {
            position: fixed;
            width: 40px; 
            height: 40px; 
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 35초 동안 부드럽게 전체 궤도를 비행합니다 */
            animation: soar-and-loop 35s ease-in-out infinite;
        }

        .spaceship-visual {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #22d3ee 0%, #818cf8 50%, #312e81 100%);
            border-radius: 50% 50% 10% 10%; /* 위쪽이 머리 방향 */
            filter: drop-shadow(0 0 8px #22d3ee) drop-shadow(0 0 15px #818cf8);
            position: relative;
        }

        .spaceship-visual::after {
            content: '';
            position: absolute;
            bottom: -5px; 
            left: 50%;
            transform: translateX(-50%);
            width: 10px; 
            height: 10px; 
            background: #f59e0b;
            border-radius: 50%;
            filter: blur(3px) drop-shadow(0 0 5px #f59e0b);
            animation: engineFire 0.2s infinite alternate;
        }

        @keyframes engineFire {
            from { transform: translateX(-50%) scale(1); opacity: 0.8; }
            to { transform: translateX(-50%) scale(1.2); opacity: 1; }
        }

        /* [새로운 궤도 수정] 왼쪽 출발 -> 중앙 360도 회전 루프 -> 오른쪽 위 소멸 */
        @keyframes soar-and-loop {
            0% { 
                top: 50%; left: -10%; 
                transform: scale(1.3) rotate(90deg); /* 왼쪽 바깥에서 정면(오른쪽) 바라보며 출발 */
            }
            30% { 
                top: 50%; left: 40%; 
                transform: scale(1.0) rotate(90deg); /* 가운데 부근까지 직선 진입 */
            }
            /* --- 가운데 구간에서 머리 방향을 틀며 360도 회전 곡선 비행 --- */
            40% { 
                top: 35%; left: 50%; 
                transform: scale(0.85) rotate(30deg); /* 위쪽으로 곡선을 그리며 회전 시작 */
            }
            50% { 
                top: 50%; left: 60%; 
                transform: scale(0.75) rotate(-60deg); /* 오른쪽 아래로 하강 유턴 */
            }
            60% { 
                top: 65%; left: 50%; 
                transform: scale(0.65) rotate(-150deg); /* 왼쪽 아래로 돌아오며 바닥 회전 */
            }
            70% { 
                top: 50%; left: 40%; 
                transform: scale(0.55) rotate(-240deg); /* 왼쪽 위로 치솟으며 회전 거의 완료 */
            }
            /* --- 루프 완료 후 오른쪽 위 목적지 별을 향해 조준 및 탈출 --- */
            80% { 
                top: 35%; left: 52%; 
                transform: scale(0.45) rotate(-315deg); /* 오른쪽 위 대각선 방향으로 정렬 (-315도 = 45도) */
            }
            100% { 
                top: -10%; left: 110%; 
                transform: scale(0.1) rotate(-315deg); /* 원근감과 함께 작아지며 우측 상단 소멸 */
            }
        }

        /* [그대로 유지] 4. 진짜 밤하늘의 원형 반짝임 별 효과 */
        .special-circle-star {
            position: absolute;
            border-radius: 50%;
            animation: super-glow-pure 2.5s infinite ease-in-out;
            pointer-events: none;
            background: white;
        }
        @keyframes super-glow-pure {
            0%, 100% { 
                opacity: 0.3; 
                transform: scale(0.8);
                box-shadow: 0 0 4px white, 0 0 8px white;
            }
            50% { 
                opacity: 1; 
                transform: scale(1.2);
                box-shadow: 0 0 12px white, 0 0 20px white, 0 0 30px var(--glow-color);
            }
        }

        /* [그대로 유지] 5. 박스 디자인 (Glassmorphism) */
        .glass-box {
            background: rgba(8, 15, 30, 0.7);
            border: 1px solid rgba(34, 211, 238, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-box:hover {
            border-color: #22d3ee;
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.15);
            transform: translateY(-10px) scale(1.02);
        }

        .neon-text {
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.7);
        }
    </style>
</head>
<body>

    <div class="star-field" id="starField"></div>

    <div class="spaceship-container">
        <div class="spaceship-visual"></div>
    </div>

    <header class="fixed top-0 w-full z-50 border-b border-white/10 bg-black/60 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-user-astronaut text-cyan-400 text-2xl"></i>
                <span class="font-future font-black text-2xl tracking-tighter neon-text">OMNISCIENT MAJOR</span>
            </div>
            <nav class="hidden lg:flex items-center gap-6 text-xs font-bold text-slate-400 uppercase tracking-widest">

                <a href="#section3" class="hover:text-cyan-400 transition">3. 미래직무 다이빙</a>
                <a href="#section4" class="hover:text-cyan-400 transition">4. 포
