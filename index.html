<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전지적 전공시점 | 신산업 학과 탐험 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #000000;
        }
        .font-future {
            font-family: 'Orbitron', sans-serif;
        }
        /* 우주선 유영 애니메이션 */
        @keyframes spaceFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }
        .animate-spaceship {
            animation: spaceFloat 5s ease-in-out infinite;
        }
        /* 은은한 네온 빛 효과 */
        .neon-glow {
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.2);
        }
        .neon-text {
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.6);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col selection:bg-cyan-500 selection:text-slate-900 overflow-x-hidden">

    <header class="border-b border-slate-900 bg-black/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center text-white text-lg shadow-lg shadow-cyan-500/20">
                    <i class="fa-solid fa-user-astronaut"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tight bg-gradient-to-r from-white via-slate-200 to-cyan-400 bg-clip-text text-transparent">
                    전지적 전공시점
                </span>
            </div>
            <nav class="hidden md:flex space-x-8 text-sm font-semibold text-slate-400">
                <a href="#intro" class="text-cyan-400 hover:text-cyan-300 transition">홈</a>
                <a href="#about" class="hover:text-cyan-400 transition">탐험 목적</a>
                <a href="#industry" class="hover:text-cyan-400 transition">4대 신산업</a>
                <a href="#framework" class="hover:text-cyan-400 transition">전공시점 분석</a>
                <a href="#mission" class="hover:text-cyan-400 transition">챌린지 미션</a>
            </nav>
            <div>
                <a href="#industry" class="bg-gradient-to-r from-cyan-500 to-blue-600 text-slate-950 text-xs px-4 py-2 rounded-xl font-extrabold tracking-wide transition shadow-md shadow-cyan-500/10 hover:opacity-90">
                    우주선 탑승 <i class="fa-solid fa-rocket ml-1"></i>
                </a>
            </div>
        </div>
    </header>

    <section id="intro" class="relative overflow-hidden pt-32 pb-24 min-h-[85vh] flex items-center bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-950 via-black to-black border-b border-slate-900">
        <div class="absolute top-1/3 left-1/4 w-[400px] h-[400px] bg-cyan-500/10 rounded-full blur-[150px] pointer-events-none"></div>
        <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-purple-500/10 rounded-full blur-[150px] pointer-events-none"></div>

        <div class="max-w-7xl mx-auto px-6 w-full grid grid-cols-1 lg:grid-cols-12 gap-12 items-center relative z-10">
            <div class="lg:col-span-7 text-left space-y-6">
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-900/80 border border-cyan-500/30 text-cyan-400 text-xs font-bold tracking-wider uppercase font-future neon-glow">
                    <span class="flex h-2 w-2 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                    </span>
                    Omniscient Major View Platform
                </div>
                <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight leading-tight text-white">
                    전공자의 시선으로<br>
                    <span class="bg-gradient-to-r from-cyan-400 via-teal-300 to-blue-500 bg-clip-text text-transparent neon-text">
                        미래 신산업 학과
                    </span>를 탐험하다
                </h1>
                <p class="text-base md:text-lg text-slate-400 max-w-xl leading-relaxed">
                    대구 미래역량 교육과정을 바탕으로 구축된 진로 설계 공간입니다. 중학생들의 소질과 적성에 맞추어 대학의 유망 학과들을 입체적으로 분석합니다.
                </p>
                <div class="pt-4 flex flex-wrap gap-4">
                    <a href="#industry" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-950 font-extrabold px-6 py-4 rounded-2xl transition transform hover:-translate-y-0.5 shadow-lg shadow-cyan-500/20 text-sm">
                        🪐 은하계 전공 탐험 개시
                    </a>
                    <a href="#mission" class="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 font-semibold px-6 py-4 rounded-2xl transition text-sm">
                        🎮 챌린지 미션 확인
                    </a>
                </div>
            </div>
            
            <div class="lg:col-span-5 flex justify-center lg:justify-end">
                <div class="relative animate-spaceship">
                    <div class="w-64 h-64 md:w-80 md:h-80 bg-gradient-to-br from-cyan-500/10 to-purple-500/10 rounded-full border border-cyan-500/20 flex items-center justify-center text-7xl md:text-8xl text-cyan-400 shadow-2xl shadow-cyan-500/20">
                        <i class="fa-solid fa-shuttle-space transform -rotate-45 neon-text"></i>
                    </div>
                    <div class="absolute -top-4 -right-4 w-12 h-12 bg-slate-900 border border-slate-800 rounded-full flex items-center justify-center text-xl text-purple-400">
                        <i class="fa-solid fa-satellite"></i>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="about" class="py-24 bg-black max-w-7xl mx-auto px-6 w-full">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
            <div class="lg:col-span-4">
                <h2 class="text-xs font-bold text-cyan-400 tracking-widest uppercase font-future mb-3">MISSION OBJECTIVE</h2>
                <p class="text-2xl md:text-4xl font-extrabold text-white tracking-tight leading-snug">탐험 플랫폼의<br>지향점</p>
            </div>
            <div class="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-950 border border-slate-900 rounded-2xl p-6">
                    <h3 class="text-lg font-bold text-cyan-400 mb-3"><i class="fa-solid fa-compass mr-2"></i>주도적 진로 설계</h3>
                    <p class="text-sm text-slate-4
