<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우주선 유영 시뮬레이션</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --title-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* [조건 1] 타이틀 크기 현재의 2/3(약 66%)로 축소 */
        .title-container {
            text-align: center;
            margin-top: 20px;
        }

        h1 {
            color: var(--title-color);
            font-size: 1.66rem; /* 기존 2.5rem 기준에서 2/3 크기인 약 1.66rem으로 조절 */
            font-weight: 600;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* [조건 2] 상단 메뉴 4개: 번호 제외, 각각 다른 형광색 박스 적용 */
        .nav-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            position: relative;
            z-index: 10;
        }

        .nav-item {
            padding: 10px 24px;
            font-weight: bold;
            font-size: 1rem;
            color: #000000; /* 형광 배경 대비 가독성을 위해 검은색 글씨 */
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .nav-item:hover {
            transform: scale(1.05);
        }

        /* 각기 다른 형광색 (Neon Color) 정의 */
        .menu-1 { background-color: #39FF14; box-shadow: 0 0 15px #39FF14; } /* 형광 연두 */
        .menu-2 { background-color: #FF073A; box-shadow: 0 0 15px #FF073A; } /* 형광 레드/핑크 */
        .menu-3 { background-color: #00E5FF; box-shadow: 0 0 15px #00E5FF; } /* 형광 시안 블루 */
        .menu-4 { background-color: #FFEF00; box-shadow: 0 0 15px #FFEF00; } /* 형광 옐로우 */

        /* [조건 3] 우주선이 유영할 Canvas 배경 */
        #spaceCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 메뉴 클릭 방해 금지 */
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="title-container">
        <h1>Space Exploration</h1>
    </div>

    <nav class="nav-container">
        <div class="nav-item menu-1">Overview</div>
        <div class="nav-item menu-2">Mission</div>
        <div class="nav-item menu-3">Technology</div>
        <div class="nav-item menu-4">Contact</div>
    </nav>

    <canvas id="spaceCanvas"></canvas>
