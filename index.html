<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내일(Tomorrow)의 내 일(Job) 탐색 | 나만의 신산업 진로 탐험 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Pretendard:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* [그대로 유지] 1. 우주 배경 및 기본 스타일 */
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }

        .font-future { font-family: 'Orbitron', sans-serif; }

        /* [그대로 유지] 2. 애니메이션: 배경 잔별 효과 (450개 고밀도) */
        .star-field {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
            filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.8));
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* [수정] 3. 애니메이션: 더 천천히 비행하며 가운데를 한 바퀴 도는 우주선 */
        .spaceship-container {
            position: fixed;
            width: 40px; 
            height: 40px; 
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 20s -> 35s로 변경하여 훨씬 더 부드럽고 천천히 이동 */
            animation: soar-and-loop 35s ease-in-out infinite;
        }

        .spaceship-visual {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #22d3ee 0%, #818cf8 50%, #312e81 100%);
            border-radius: 50% 50% 10% 10%; /* 위쪽이 머리 방향 */
            filter: drop-shadow(0 0 8px #22d3ee) drop-shadow(0 0 15px #818cf8);
            position: relative;
            /* 회전 각도는 실시간 궤도에 맞춰 컨테이너 애니메이션에서 통합 제어합니다 */
        }

        .spaceship-visual::after {
            content: '';
            position: absolute;
            bottom: -5px; 
            left: 50%;
            transform: translateX(-50%);
            width: 10px; 
            height: 10px; 
            background: #f59e0b;
            border-radius: 50%;
            filter: blur(3px) drop-shadow(0 0 5px #f59e0b);
            animation: engineFire 0.2s infinite alternate;
        }

        @keyframes engineFire {
            from { transform: translateX(-50%) scale(1); opacity: 0.8; }
            to { transform: translateX(-50%) scale(1.2); opacity: 1; }
        }

        /* [새로운 궤도] 왼쪽 아래 -> 중앙 도달 후 시계방향 회전 루프 -> 오른쪽 위 소멸 */
        @keyframes soar-and-loop {
            0% { 
                top: 110%; left: -10%; 
                transform: scale(1.3) rotate(45deg); /* 출발 (오른쪽 위 조준) */
            }
            25% { 
                top: 60%; left: 35%; 
                transform: scale(1.0) rotate(45deg); /* 중앙 진입 직전 수평 유지 */
            }
            /* --- 화면 가운데(타이틀 주변)에서 360도 회전 회오리 루프 구간 --- */
            35% { 
                top: 35%; left: 50%; 
                transform: scale(0.85) rotate(90deg); /* 1시 방향 비행 (우측 이동) */
            }
            45% { 
                top: 50%; left: 65%; 
                transform: scale(0.75) rotate(180deg); /* 5시 방향 비행 (하강) */
            }
            55% { 
                top: 65%; left: 50%; 
                transform: scale(0.65) rotate(270deg); /* 7시 방향 비행 (좌측 이동) */
            }
            65% { 
                top: 50%; left: 35%; 
                transform: scale(0.55) rotate(360deg); /* 11시 방향 비행 (상승하며 루프 완료) */
            }
            /* --- 루프 탈출 후 다시 최종 목적지인 우측 상단 별을 향해 비행 --- */
            75% { 
                top: 30%; left: 55%; 
                transform: scale(0.4) rotate(405deg); /* 다시 대각선 방향 정렬 (405도 = 45도) */
            }
            100% { 
                top: -10%; left: 110%; 
                transform: scale(0.1) rotate(405deg); /* 원근감과 함께 작아지며 소멸 */
            }
        }

        /* [그대로 유지] 4. 진짜 밤하늘의 원형 반짝임 별 효과 */
        .special-circle-star {
            position: absolute;
            border-radius: 50%;
            animation: super-glow-pure 2.5s infinite ease-in-out;
            pointer-events: none;
            background: white;
        }
        @keyframes super-glow-pure {
            0%, 100% { 
                opacity: 0.3; 
                transform: scale(0.8);
                box-shadow: 0 0 4px white, 0 0 8px white;
            }
            50% { 
                opacity: 1; 
                transform: scale(1.2);
                box-shadow: 0 0 12px white, 0 0 20px white, 0 0 30px var(--glow-color);
            }
        }

        /* [그대로 유지] 5. 박스 디자인 (Glassmorphism) */
        .glass-box {
            background: rgba(8, 15, 30, 0.7);
            border: 1px solid rgba(34, 211, 238, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-box:hover {
            border-color: #22d3ee;
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.15);
            transform: translateY(-10px) scale(1.02);
        }

        .neon-text {
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.7);
        }
    </style>
</head>
<body>

    <div class="star-field" id="starField"></div>

    <div class="spaceship-container">
        <div class="spaceship-visual"></div>
    </div>

    <header class="fixed top-0 w-full z-50 border-b border-white/10 bg-black/60 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-user-astronaut text-cyan-400 text-2xl"></i>
                <span class="font-future font-black text-2xl tracking-tighter neon-text">OMNISCIENT MAJOR</span>
            </div>
            <nav class="hidden lg:flex items-center gap-6 text-xs font-bold text-slate-400 uppercase tracking-widest">
                <a href="#section1" class="hover:text-cyan-400 transition">1. 신산업 로그인</a>
                <a href="#section2" class="hover:text-cyan-400 transition">2. 자기이해 체크인</a>
                <a href="#section3" class="hover:text-cyan-400 transition">3. 미래직무 다이빙</a>
                <a href="#section4" class="hover:text-cyan-400 transition">4. 포트폴리오</a>
                <a href="#section5" class="hover:text-cyan-400 transition">5. 교육 자료실</a>
            </nav>
        </div>
    </header>

    <main class="relative z-10">
        <section class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-20">
            <div class="inline-block px-4 py-1.5 rounded-full border border-cyan-500/30 bg-cyan-500/10 text-cyan-400 text-[10px] font-bold tracking-[0.3em] mb-6 uppercase font-future">
                Deep Space Major Exploration
            </div>
