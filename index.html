<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내일(Tomorrow)의 내 일(Job) 탐색 | 나만의 신산업 진로 탐험 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Pretendard:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* [그대로 유지] 1. 우주 배경 및 기본 스타일 */
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }

        .font-future { font-family: 'Orbitron', sans-serif; }

        /* [그대로 유지] 2. 애니메이션: 배경 잔별 효과 (450개 고밀도) */
        .star-field {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
            filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.8));
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* [그대로 유지] 3. 우주선 컨테이너 구조 및 엔진 효과 */
        .spaceship-container {
            position: fixed;
            width: 40px; 
            height: 40px; 
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 35초 동안 정밀하게 설계된 루프 궤도를 비행합니다 */
            animation: soar-and-loop 35s ease-in-out infinite;
        }

        .spaceship-visual {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #22d3ee 0%, #818cf8 50%, #312e81 100%);
            border-radius: 50% 50% 10% 10%; /* 위쪽이 머리 방향 */
            filter: drop-shadow(0 0 8px #22d3ee) drop-shadow(0 0 15px #818cf8);
            position: relative;
        }

        .spaceship-visual::after {
            content: '';
            position: absolute;
            bottom: -5px; 
            left: 50%;
            transform: translateX(-50%);
            width: 10px; 
            height: 10px; 
            background: #f59e0b;
            border-radius: 50%;
            filter: blur(3px) drop-shadow(0 0 5px #f59e0b);
            animation: engineFire 0.2s infinite alternate;
        }

        @keyframes engineFire {
            from { transform: translateX(-50%) scale(1); opacity: 0.8; }
            to { transform: translateX(-50%) scale(1.2); opacity: 1; }
        }

        /* [정밀 수정] 왼쪽 아래 출발 -> 중앙 360도 완벽한 회전 -> 방향 유지하며 우측 상단 소멸 */
        @keyframes soar-and-loop {
            0% { 
                top: 110%; left: -10%; 
                transform: scale(1.3) rotate(45deg); /* 왼쪽 아래 외곽 출발 (진행 방향인 대각선 위 조준) */
            }
            25% { 
                top: 65%; left: 35%; 
                transform: scale(1.0) rotate(45deg); /* 중앙 진입점 도달 */
            }
            /* --- 중앙 구역에서 진행 방향에 따라 머리를 자연스럽게 돌리며 회전하는 루프 구간 --- */
            37% { 
                top: 35%; left: 50%; 
                transform: scale(0.85) rotate(90deg); /* 12시방향 통과하며 우측으로 선회 */
            }
            49% { 
                top: 50%; left: 65%; 
                transform: scale(0.75) rotate(180deg); /* 3시방향 통과하며 아래로 선회 */
            }
            61% { 
                top: 65%; left: 50%; 
                transform: scale(0.65) rotate(270deg); /* 6시방향 통과하며 좌측으로 선회 */
            }
            73% { 
                top: 50%; left: 35%; 
                transform: scale(0.55) rotate(360deg); /* 9시방향 통과하며 루프 완료 및 상향 정렬 */
            }
            /* --- 루프 탈출 후 오른쪽 위 목적지를 향해 가속 비행 및 소멸 --- */
            83% { 
                top: 30%; left: 55%; 
                transform: scale(0.4) rotate(405deg); /* 오른쪽 위 대각선 방향으로 머리를 정조준 (360도 + 45도) */
            }
            100% { 
                top: -15%; left: 115%; 
                transform: scale(0.05) rotate(405deg); /* 원근감과 함께 아주 작아지며 우측 상단 화면 밖 소멸 */
            }
        }

        /* [그대로 유지] 4. 진짜 밤하늘의 원형 반짝임 별 효과 */
        .special-circle-star {
            position: absolute;
            border-radius: 50%;
            animation: super-glow-pure 2.5s infinite ease-in-out;
            pointer-events: none;
            background: white;
        }
        @keyframes super-glow-pure {
            0%, 100% { 
                opacity: 0.3; 
                transform: scale(0.8);
                box-shadow: 0 0 4px white, 0 0 8px white;
            }
            50% { 
                opacity: 1; 
                transform: scale(1.2);
                box-shadow: 0 0 12px white, 0 0 20px white, 0 0 30px var(--glow-color);
            }
        }

        /* [그대로 유지] 5. 박스 디자인 (Glassmorphism) */
        .glass-box {
            background: rgba(8, 15, 30, 0.7);
            border: 1px solid rgba(34, 211, 238, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-box:hover {
            border-color: #22d3ee;
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.15);
            transform: translateY(-10px) scale(1.02);
        }

        .neon-text {
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.7);
        }
    </style>
</head>
<body>

    <div class="star-field" id="starField"></div>

    <div class="spaceship-container">
        <div class="spaceship-visual"></div>
    </div>

    <header class="fixed top-0 w-full z-50 border-b border-white/10 bg-black/60 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-user-astronaut text-cyan-400 text-2xl"></i>
                <span class="font-future font-black text-2xl tracking-tighter neon-text">OMNISCIENT MAJOR</span>
            </div>
            <nav class="hidden lg:flex items-center gap-6 text-xs font-bold text-slate-400 uppercase tracking-widest">
                <a href="#section1" class="hover:text-cyan-400 transition">1. 신산업 로그인</a>
                <a href="#section2" class="hover:text-cyan-400 transition">2. 자기이해 체크인</a>
                <a href="#section3" class="hover:text-cyan-400 transition">3. 미래직무 다이빙</a>
                <a href="#section4" class="hover:text-cyan-400 transition">4. 포트폴리오</a>
                <a href="#section5" class="hover:text-cyan-400 transition">5. 교육 자료실</a>
            </nav>
        </div>
    </header>

    <main class="relative z-10">
        <section class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-20">
            <div class="inline-block px-4 py-1.5 rounded-full border border-cyan-500/30 bg-cyan-500/10 text-cyan-400 text-[10px] font-bold tracking-[0.3em] mb-6 uppercase font-future">
                Deep Space Major Exploration
            </div>
            
            <div class="relative inline-block mb-8">
                <div class="special-circle-star w-1.5 h-1.5 -top-6 -left-8" style="animation-delay: 0s; --glow-color: rgba(34, 211, 238, 0.8);"></div>
                <div class="special-circle-star w-2 h-2 -bottom-4 -right-10" style="animation-delay: 0.7s; --glow-color: rgba(168, 85, 247, 0.8);"></div>
                <div class="special-circle-star w-1 h-1 top-2 -right-12" style="animation-delay: 1.4s; --glow-color: rgba(252, 211, 77, 0.8);"></div>

                <h1 class="text-5xl md:text-8xl font-black leading-tight selection:bg-cyan-500/30">
                    내일(Tomorrow)의<br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-400 to-indigo-500 neon-text">내 일(Job) 탐색</span>
                </h1>
            </div>

            <p class="text-slate-400 max-w-2xl text-lg md:text-xl leading-relaxed font-light">
                우주를 탐험하듯, 내일의 전공을 탐색하세요.<br>
                중학생들의 소질과 적성을 신산업 트렌드와 연결하는 완벽한 가이드.
            </p>
            <div class="mt-12">
                <a href="#section1" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:scale-110 text-black font-black px-10 py-4 rounded-full transition-all shadow-lg shadow-cyan-500/30 text-sm">
                    탐사 시작하기 <i class="fa-solid fa-arrow-right ml-2"></i>
                </a>
            </div>
        </section>

        <section class="max-w-7xl mx-auto px-6 py-32 selection:bg-purple-500/30">
