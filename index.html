<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내일의 내 일(Job) 탐색</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000 url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" /></filter></defs><circle cx="10" cy="20" r="1" fill="white" opacity="0.8"/><circle cx="60" cy="15" r="0.5" fill="white" opacity="0.6"/><circle cx="80" cy="50" r="1.5" fill="white" opacity="0.7"/><circle cx="30" cy="70" r="0.8" fill="white" opacity="0.5"/><circle cx="90" cy="80" r="1" fill="white" opacity="0.9"/></svg>');
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 별 애니메이션 */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: transparent;
            padding: 50px 40px 20px 40px;
            border-radius: 10px;
            max-width: 900px;
            margin: -100px auto 0 auto;
            overflow: visible;
        }

        .container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: 380px;
            height: 300px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at center, rgba(168, 244, 255, 0.22), rgba(96, 193, 255, 0.08) 50%, transparent 70%);
            filter: blur(32px);
            opacity: 1;
            pointer-events: none;
            z-index: -1;
        }

        h1 {
            width: 100%;
            font-size: 2.25em;
            color: #a8f4ff;
            margin-bottom: 0;
            margin-top: 0;
            text-shadow: 0 0 18px rgba(138, 244, 255, 0.8), 0 0 40px rgba(96, 193, 255, 0.35);
            font-weight: bold;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 1.3em;
            color: #00ff88;
            margin-bottom: 0;
            margin-top: 8px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .content {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: auto;
            max-width: calc(100vw - 24px);
            padding: 0 8px;
            overflow-x: auto;
            z-index: 12;
        }

        .content::-webkit-scrollbar {
            height: 6px;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.4);
            border-radius: 10px;
        }

        .button {
            position: relative;
            font-family: 'TDTD', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #00ff88 0%, #00ccff 100%);
            border: 1.5px solid #00ff88;
            color: #000;
            padding: 10px 12px;
            font-size: 0.85em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.25s ease;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            min-width: 130px;
            max-width: 170px;
            white-space: nowrap;
            text-align: center;
            overflow: visible;
        }

        .button::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            width: 24px;
            height: 8px;
            transform: translateX(-50%);
            background: radial-gradient(circle at center, rgba(129, 255, 213, 0.95), rgba(255, 255, 255, 0.65), transparent 65%);
            filter: blur(6px);
            opacity: 0.88;
            pointer-events: none;
            border-radius: 50%;
        }

        .button::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 40%, rgba(255, 255, 230, 0.35), rgba(255, 255, 255, 0) 55%);
            filter: blur(10px);
            opacity: 0.75;
            border-radius: 10px;
        }

        .button:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
            transform: translateY(-2px) scale(1.02);
            background: linear-gradient(135deg, #00ff88 0%, #00ffff 100%);
        }

        .button.btn1 {
            border-color: #ffff44;
            background: linear-gradient(135deg, #ffff44 0%, #ffff88 100%);
            box-shadow: 0 0 15px rgba(255, 255, 68, 0.5), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .button.btn1:hover {
            box-shadow: 0 0 30px rgba(255, 255, 68, 0.95);
        }

        .button.btn2 {
            border-color: #dd00ff;
            background: linear-gradient(135deg, #dd00ff 0%, #ff00ff 100%);
            box-shadow: 0 0 15px rgba(221, 0, 255, 0.5), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .button.btn2:hover {
            box-shadow: 0 0 30px rgba(221, 0, 255, 0.95);
        }

        .button.btn3 {
            border-color: #00ff88;
            background: linear-gradient(135deg, #00ff88 0%, #00ff66 100%);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .button.btn3:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.95);
        }

        .button.btn4 {
            border-color: #ff3333;
            background: linear-gradient(135deg, #ff3333 0%, #ff5555 100%);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.5), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .button.btn4:hover {
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.95);
        }

        .button.btn5 {
            border-color: #bbbbbb;
            background: linear-gradient(135deg, #cccccc 0%, #dddddd 100%);
            color: #000;
            box-shadow: 0 0 15px rgba(187, 187, 187, 0.5), inset 0 1px 0 rgba(255,255,255,0.4);
        }

        .button.btn5:hover {
            box-shadow: 0 0 30px rgba(187, 187, 187, 0.95);
        }

        /* 우주선 */
        .spaceship {
            position: fixed;
            width: 36px;
            height: 44px;
            z-index: 5;
            pointer-events: none;
            transform-origin: center center;
            overflow: visible;
        }

        .spaceship svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .launch-glow {
            position: absolute;
            left: 50%;
            bottom: -18px;
            width: 22px;
            height: 50px;
            transform: translateX(-50%);
            border-radius: 50% 50% 65% 65% / 35% 35% 75% 75%;
            background: radial-gradient(circle at 50% 8%, #ffdb3f 0%, #ffb800 25%, rgba(255, 160, 0, 0.95) 50%, rgba(255, 100, 0, 0.4) 75%, transparent 100%);
            filter: blur(3px);
            box-shadow: 0 0 35px 14px rgba(255, 140, 0, 0.65), inset -2px -2px 8px rgba(255, 180, 0, 0.4);
            opacity: 0.98;
            animation: shimmer 0.8s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.95; box-shadow: 0 0 35px 14px rgba(255, 140, 0, 0.65), inset -2px -2px 8px rgba(255, 180, 0, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 45px 18px rgba(255, 150, 0, 0.8), inset -2px -2px 12px rgba(255, 200, 0, 0.5); }
        }
    </style>
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    
    <div class="spaceship" id="spaceship" aria-label="우주선">
        <svg viewBox="0 0 60 70" xmlns="http://www.w3.org/2000/svg" role="img">
            <defs>
                <radialGradient id="thimbleGradient" cx="35%" cy="30%" r="60%">
                    <stop offset="0%" stop-color="#1a3a5c" />
                    <stop offset="70%" stop-color="#0a1928" />
                    <stop offset="100%" stop-color="#050d1a" />
                </radialGradient>
            </defs>
            <path d="M12 8 L48 8 L52 20 L52 55 C52 62 46 68 30 68 C14 68 8 62 8 55 L8 20 Z" fill="url(#thimbleGradient)" stroke="#1f4a7f" stroke-width="1.2" />
            <ellipse cx="30" cy="12" rx="14" ry="6" fill="#0f2549" opacity="0.7" />
            <ellipse cx="30" cy="35" rx="10" ry="8" fill="#2a5a9f" opacity="0.6" />
            <path d="M20 25 Q30 28 40 25" fill="none" stroke="#3a7fbf" stroke-width="1" opacity="0.5" />
            <path d="M18 45 Q30 48 42 45" fill="none" stroke="#3a7fbf" stroke-width="1" opacity="0.4" />
        </svg>
        <div class="launch-glow"></div>
    </div>

    <div class="content">
        <button class="button btn1">신산업 세계로 로그인</button>
        <button class="button btn2">자기 이해 체크</button>
        <button class="button btn3">미래 직무 속으로 다이빙</button>
        <button class="button btn4">진로 포트폴리오</button>
        <button class="button btn5">신산업 진로 교육 자료실</button>
    </div>

    <div class="container">
        <h1>내 일(Tomorrow)의<br>내일(Job) 탐색</h1>
        <p class="subtitle">나만의 신산업 진로 탐험 가이드</p>
    </div>

    <script>
        // 별 애니메이션
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();

        const stars = [];
        const starCount = 280;

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 2.3 + 0.3;
                this.baseOpacity = Math.random() * 0.6 + 0.2;
                this.opacity = this.baseOpacity;
                this.twinkleSpeed = Math.random() * 0.014 + 0.003;
                this.opacityDirection = Math.random() > 0.5 ? 1 : -1;
                this.color = ['#ffffff', '#f8f8ff', '#ffeedd', '#d6f7ff'][Math.floor(Math.random() * 4)];
            }

            update() {
                this.opacity += this.twinkleSpeed * this.opacityDirection;
                if (this.opacity >= 1) {
                    this.opacityDirection = -1;
                } else if (this.opacity <= 0.1) {
                    this.opacityDirection = 1;
                }
            }

            draw() {
                const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 4);
                glow.addColorStop(0, `rgba(255,255,255,${this.opacity})`);
                glow.addColorStop(0.4, `rgba(255,255,255,${this.opacity * 0.35})`);
                glow.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createStars() {
            stars.length = 0;
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
        }

        createStars();

        function animateStars() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            requestAnimationFrame(animateStars);
        }

        animateStars();

        // 우주선 애니메이션
        const spaceship = document.getElementById('spaceship');
        const flightDuration = 38000;
        let flightStart = performance.now();

        function easeInOut(t) {
            return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        }

        function smoothEase(t) {
            return t * t * (3 - 2 * t);
        }

        function animateSpaceship(timestamp) {
            const elapsed = timestamp - flightStart;
            let progress = elapsed / flightDuration;
            if (progress > 1) {
                flightStart = timestamp + 2500;
                progress = 0;
            }

            const smoothProg = smoothEase(progress);
            const centerX = canvas.width * 0.5;
            const centerY = canvas.height * 0.45;
            const entryEnd = 0.2;
            const exitStart = 0.55;
            const startX = -80;
            const startY = canvas.height + 80;
            const midX = centerX;
            const midY = centerY - 50;
            const exitX = canvas.width + 80;
            const exitY = canvas.height * 0.2;
            let x, y, rotation, scale, opacity;

            if (progress <= entryEnd) {
                const t = smoothEase(progress / entryEnd);
                x = startX + (midX - startX) * t;
                y = startY + (midY - startY) * t;
                rotation = -50 + t * 75;
                scale = 0.68 + t * 0.24;
                opacity = 0.55 + t * 0.45;
            } else if (progress <= exitStart) {
                const midProgress = (progress - entryEnd) / (exitStart - entryEnd);
                const midWave = Math.sin(midProgress * Math.PI) * 0.05;
                x = midX + Math.sin(midProgress * Math.PI * 1.5) * 25 + midWave * 15;
                y = midY + midProgress * 40 - midWave * 50;
                rotation = 25 + midProgress * 55;
                scale = 0.92 + Math.sin(midProgress * Math.PI) * 0.05;
                opacity = 1;
            } else {
                const t = (progress - exitStart) / (1 - exitStart);
                const tSmooth = smoothEase(t);
                x = midX + (exitX - midX) * tSmooth;
                y = midY + 40 + (exitY - midY - 40) * tSmooth;
                rotation = 80 + tSmooth * 75;
                scale = 0.97 - tSmooth * 0.42;
                opacity = Math.max(0, 1 - tSmooth * 1.2);
            }

            spaceship.style.left = x + 'px';
            spaceship.style.top = y + 'px';
            spaceship.style.transform = `translate(-50%, -50%) scale(${scale}) rotate(${rotation}deg)`;
            spaceship.style.opacity = opacity;

            requestAnimationFrame(animateSpaceship);
        }

        requestAnimationFrame(animateSpaceship);

        // 창 크기 변경 시
        window.addEventListener('resize', () => {
            resizeCanvas();
            createStars();
        });

        // 버튼 클릭 효과
        document.querySelectorAll('.button').forEach(button => {
            button.addEventListener('click', function() {
                alert('상담으로 이동합니다!');
            });
        });
    </script>
</body>
</html>
