<!DOCTYPE html>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #000000;
        }
        .font-future {
            font-family: 'Orbitron', sans-serif;
        }
        /* 우주선 유영 애니메이션 */
        @keyframes spaceFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        .animate-spaceship {
            animation: spaceFloat 6s ease-in-out infinite;
        }
        /* 은은한 네온 효과 */
        .neon-glow {
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.15);
        }
        .neon-text {
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col selection:bg-cyan-500 selection:text-slate-900 overflow-x-hidden">

                <span class="font-extrabold text-xl tracking-tight bg-gradient-to-r from-white via-slate-200 to-cyan-400 bg-clip-text text-transparent">

            <div>
                <a href="#industry" class="bg-gradient-to-r from-cyan-500 to-blue-600 text-slate-950 text-xs px-4 py-2 rounded-xl font-extrabold tracking-wide transition shadow-md shadow-cyan-500/10 hover:opacity-95">
