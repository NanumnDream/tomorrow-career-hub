<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내일의 내 일(Job) 탐색</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000 url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" /></filter></defs><circle cx="10" cy="20" r="1" fill="white" opacity="0.8"/><circle cx="60" cy="15" r="0.5" fill="white" opacity="0.6"/><circle cx="80" cy="50" r="1.5" fill="white" opacity="0.7"/><circle cx="30" cy="70" r="0.8" fill="white" opacity="0.5"/><circle cx="90" cy="80" r="1" fill="white" opacity="0.9"/></svg>');
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 별 애니메이션 */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 60px 40px;
            border-radius: 10px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            width: 100%;
            font-size: 3.5em;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            font-weight: bold;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.3em;
            color: #00ff88;
            margin-bottom: 60px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .button {
            background: linear-gradient(135deg, #00ff88 0%, #00ccff 100%);
            border: 3px solid #00ff88;
            color: #000;
            padding: 25px 20px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .button:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
            transform: scale(1.05);
            background: linear-gradient(135deg, #00ff88 0%, #00ffff 100%);
        }

        .button.btn1 {
            border-color: #00ff88;
            background: linear-gradient(135deg, #00ff88 0%, #00ff88 100%);
        }

        .button.btn2 {
            border-color: #00ffff;
            background: linear-gradient(135deg, #00ccff 0%, #00ffff 100%);
        }

        .button.btn3 {
            border-color: #ffff00;
            background: linear-gradient(135deg, #ffff00 0%, #ff00ff 100%);
        }

        /* 우주선 */
        .spaceship {
            position: fixed;
            width: 100px;
            height: 100px;
            z-index: 5;
            pointer-events: none;
        }

        .spaceship img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    
    <div class="spaceship" id="spaceship" aria-label="우주선">
        <svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg" role="img">
            <defs>
                <linearGradient id="bodyGradient" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#001f4d" />
                    <stop offset="100%" stop-color="#001b3f" />
                </linearGradient>
                <linearGradient id="windowGradient" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#9fe6ff" />
                    <stop offset="100%" stop-color="#5cc8ff" />
                </linearGradient>
                <linearGradient id="rocketFlame" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#ffffff" />
                    <stop offset="35%" stop-color="#fff2a0" />
                    <stop offset="70%" stop-color="#ff8c3c" />
                    <stop offset="100%" stop-color="#ff3e3e" />
                </linearGradient>
                <radialGradient id="engineGlow" cx="0.5" cy="0.2" r="0.5">
                    <stop offset="0%" stop-color="#a6fffb" stop-opacity="0.9" />
                    <stop offset="100%" stop-color="#00a1ff" stop-opacity="0" />
                </radialGradient>
            </defs>
            <path d="M35 46 C30 66 40 95 50 105 C62 115 78 115 90 105 C100 95 110 66 105 46 C90 40 50 40 35 46 Z" fill="url(#bodyGradient)" stroke="#89b7ff" stroke-width="3" />
            <ellipse cx="70" cy="55" rx="26" ry="18" fill="url(#windowGradient)" stroke="#d7f0ff" stroke-width="3" />
            <path d="M42 92 C50 98 90 98 98 92" fill="#0f2c57" opacity="0.9" />
            <g opacity="0.85">
                <ellipse cx="70" cy="52" rx="12" ry="8" fill="url(#windowGradient)" />
                <ellipse cx="70" cy="53" rx="8" ry="5" fill="#e9fbff" opacity="0.8" />
            </g>
            <path d="M52 88 L48 104 C55 116 85 116 92 104 L88 88 Z" fill="url(#rocketFlame)" />
            <circle cx="70" cy="104" r="14" fill="url(#engineGlow)" />
            <path d="M62 92 L60 110 C63 118 77 118 80 110 L78 92 Z" fill="#ffffff" opacity="0.65" />
            <circle cx="28" cy="36" r="3" fill="#fff7b8" />
            <circle cx="112" cy="32" r="2.5" fill="#d0f4ff" />
            <path d="M20 20 L26 26 M27 12 L30 18 M16 26 L22 30" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
        </svg>
    </div>

    <div class="container">
        <h1>내일(Tomorrow)의 내 일(Job) 탐색</h1>
        <p class="subtitle">나만의 진로를 찾는 모험 가이드</p>
        
        <div class="content">
            <button class="button btn1">
                신산업 기초탐색 및<br>자기 이해하기
            </button>
            <button class="button btn2">
                자기이해 해석과<br>미래 설계하기
            </button>
            <button class="button btn3">
                미래설계와<br>실천 계획하기
            </button>
        </div>
    </div>

    <script>
        // 별 애니메이션
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();

        const stars = [];
        const starCount = 280;

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 2.3 + 0.3;
                this.baseOpacity = Math.random() * 0.6 + 0.2;
                this.opacity = this.baseOpacity;
                this.twinkleSpeed = Math.random() * 0.014 + 0.003;
                this.opacityDirection = Math.random() > 0.5 ? 1 : -1;
                this.color = ['#ffffff', '#f8f8ff', '#ffeedd', '#d6f7ff'][Math.floor(Math.random() * 4)];
            }

            update() {
                this.opacity += this.twinkleSpeed * this.opacityDirection;
                if (this.opacity >= 1) {
                    this.opacityDirection = -1;
                } else if (this.opacity <= 0.1) {
                    this.opacityDirection = 1;
                }
            }

            draw() {
                const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 4);
                glow.addColorStop(0, `rgba(255,255,255,${this.opacity})`);
                glow.addColorStop(0.4, `rgba(255,255,255,${this.opacity * 0.35})`);
                glow.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createStars() {
            stars.length = 0;
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
        }

        createStars();

        function animateStars() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            requestAnimationFrame(animateStars);
        }

        animateStars();

        // 우주선 애니메이션
        const spaceship = document.getElementById('spaceship');
        const flightDuration = 22000;
        let flightStart = performance.now();

        function easeInOut(t) {
            return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        }

        function animateSpaceship(timestamp) {
            const elapsed = timestamp - flightStart;
            let progress = elapsed / flightDuration;
            if (progress > 1) {
                flightStart = timestamp + 2600;
                progress = 0;
            }

            const eased = easeInOut(progress);
            const sway = Math.sin(progress * Math.PI * 1.3) * 50 * (1 - progress);
            const rise = Math.sin(progress * Math.PI) * 90 * (1 - progress * 0.75);
            const x = -180 + (canvas.width + 360) * eased + sway;
            const y = canvas.height + 180 - (canvas.height + 360) * eased - rise;
            const scale = 1 - eased * 0.55;
            const spinPhase = Math.max(0, Math.min(1, (progress - 0.2) / 0.55));
            const rotation = spinPhase * 360;
            const opacity = 1 - eased * 0.78;

            spaceship.style.left = x + 'px';
            spaceship.style.top = y + 'px';
            spaceship.style.transform = `translate(-50%, -50%) scale(${scale}) rotate(${rotation}deg)`;
            spaceship.style.opacity = opacity;

            requestAnimationFrame(animateSpaceship);
        }

        requestAnimationFrame(animateSpaceship);

        // 창 크기 변경 시
        window.addEventListener('resize', () => {
            resizeCanvas();
            createStars();
        });

        // 버튼 클릭 효과
        document.querySelectorAll('.button').forEach(button => {
            button.addEventListener('click', function() {
                alert(this.textContent.trim() + ' 섹션으로 이동합니다!');
            });
        });
    </script>
</body>
</html>
